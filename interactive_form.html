                    function startDrawing(e) {
                        e.preventDefault();
                        isDrawing = true;
                        const pos = getEventPosition(e);
                        const rect = canvas.getBoundingClientRect();
                        ctx.beginPath();
                        ctx.moveTo(pos.x - rect.left, pos.y - rect.top);
                    }

                    function draw(e) {
                        if (!isDrawing) return;
                        e.preventDefault();
                        const pos = getEventPosition(e);
                        const rect = canvas.getBoundingClientRect();
                        ctx.lineTo(pos.x - rect.left, pos.y - rect.top);
                        ctx.stroke();
                    }

                    function stopDrawing() {
                        isDrawing = false;
                    }

                    canvas.addEventListener('mousedown', startDrawing);
                    canvas.addEventListener('mousemove', draw);
                    canvas.addEventListener('mouseup', stopDrawing);
                    canvas.addEventListener('mouseout', stopDrawing);

                    canvas.addEventListener('touchstart', startDrawing);
                    canvas.addEventListener('touchmove', draw);
                    canvas.addEventListener('touchend', stopDrawing);
                });

                function openSignatureModal(fieldId) {
                    activeFieldId = fieldId;
                    document.getElementById('signatureModal').style.display = 'flex';
                    clearCanvas();
                }

                function closeSignatureModal() {
                    document.getElementById('signatureModal').style.display = 'none';
                    activeFieldId = null;
                }

                function clearCanvas() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }

                function saveSignature() {
                    const signatureData = canvas.toDataURL('image/png');
                    const field = document.getElementById(activeFieldId);
                    field.innerHTML = '<img src="' + signatureData + '" alt="Signed">';
                    field.classList.add('signed');
                    field.classList.remove('signature-type');
                    field.style.cursor = 'default';
                    closeSignatureModal();
                }
            </script>
</body>
</html>
